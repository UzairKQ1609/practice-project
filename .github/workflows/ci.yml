name: CI — Build & Push Docker Image

on:
  push:
    branches:
      - dev          # Trigger: Runs when you push code to dev #meowwww #laadly
  pull_request:
    branches:
      - main         # Trigger: Runs when you open a PR targeting main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWRD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/practice-project
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          # Logic: Push to DockerHub on 'dev' push. 
          # On PR to main, it just tests the build (no push).
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image digest
        if: github.event_name == 'push'
        run: |
          echo "✓ Image pushed successfully"
          echo "Digest: ${{ steps.build.outputs.digest }}"
